<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --ink:#12161c;
    --paper:#f2efe9;
    --line:#c9c3b6;
    --slab:#1d5c4f;
    --flag:#c8352a;
    --dim:#6b6255;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  .svr{
    font-family:'Archivo',system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    max-width:560px;margin:0 auto;padding:0 0 120px;
    min-height:100vh;
  }
  .svr h1,.svr h2,.svr h3{margin:0}
  .mono{font-family:'IBM Plex Mono',monospace}

  /* masthead */
  .mast{
    background:var(--ink);color:var(--paper);
    padding:18px 18px 16px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
  }
  .mast h1{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  .mast .sub{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8d968f;margin-top:5px}
  .tally{
    font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;
    line-height:1;color:var(--paper);
  }
  .tally span{display:block;font-size:9px;letter-spacing:.14em;color:#8d968f;text-align:right;margin-top:4px}

  /* header fields */
  .hdr{padding:14px 18px;border-bottom:2px solid var(--ink);display:grid;grid-template-columns:1fr 132px;gap:10px}
  label.lbl{display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600}
  .svr input,.svr textarea,.svr select{
    width:100%;font-family:'Archivo',sans-serif;font-size:15px;color:var(--ink);
    background:#fbfaf7;border:1px solid var(--line);border-radius:2px;padding:9px 10px;
  }
  .svr textarea{resize:vertical;min-height:74px;line-height:1.4}
  .svr input:focus,.svr textarea:focus,.svr select:focus{outline:2px solid var(--slab);outline-offset:0;border-color:var(--slab)}

  /* buttons */
  .btn{
    display:block;width:100%;border:0;border-radius:2px;padding:15px;
    font-family:'Archivo',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer;
  }
  .btn-primary{background:var(--slab);color:#fff}
  .btn-primary:active{background:#164a40}
  .btn-dark{background:var(--ink);color:var(--paper)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-flag{background:var(--flag);color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-row{display:flex;gap:8px}
  .btn-row .btn{flex:1}

  /* capture bar */
  .capture{padding:16px 18px;border-bottom:1px solid var(--line)}
  input[type=file]{display:none}

  /* entry list */
  .entries{padding:0}
  .empty{padding:44px 24px;text-align:center;color:var(--dim);font-size:14px;line-height:1.5}
  .empty strong{display:block;color:var(--ink);font-weight:700;margin-bottom:6px}

  .row{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);align-items:flex-start}
  .row .idx{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);width:20px;padding-top:2px;flex:none}
  .row img{width:74px;height:74px;object-fit:cover;border:1px solid var(--line);flex:none;background:#ddd8cd}
  .row .body{flex:1;min-width:0}
  .row .zone{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--slab)}
  .row .cmt{font-size:14px;line-height:1.35;margin-top:3px;word-wrap:break-word}
  .row .time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:5px}
  .row .kill{border:0;background:none;color:var(--flag);font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 0 0;cursor:pointer;text-transform:uppercase}

  /* footer actions */
  .foot{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:var(--paper);border-top:2px solid var(--ink)}

  /* editor sheet */
  .sheet{position:fixed;inset:0;background:var(--paper);z-index:50;display:flex;flex-direction:column;max-width:560px;margin:0 auto}
  .sheet-top{background:var(--ink);color:var(--paper);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .sheet-top h2{font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  .sheet-top button{background:none;border:0;color:var(--paper);font-size:13px;font-weight:700;letter-spacing:.08em;cursor:pointer;text-transform:uppercase}
  .canvas-wrap{background:#0c0f13;display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden}
  canvas{max-width:100%;touch-action:none;display:block}
  .tools{display:flex;gap:8px;padding:9px 16px;background:#191d24;align-items:center}
  .tools .t{flex:1;background:#2b313a;color:#dcd6c9;border:0;border-radius:2px;padding:10px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'Archivo',sans-serif}
  .tools .t.on{background:var(--flag);color:#fff}
  .form{padding:14px 16px;overflow-y:auto;flex:1}
  .form > div{margin-bottom:12px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 9px;border:1px solid var(--line);background:#fbfaf7;border-radius:2px;cursor:pointer}
  .chip:active{background:var(--slab);color:#fff}
  .note{font-size:11px;color:var(--dim);line-height:1.45;padding:10px 18px}
  .status{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--slab);padding:8px 18px 0;min-height:20px}
</style>

<div class="svr">
  <div class="mast">
    <div>
      <h1 id="mastTitle">Site Visit Report</h1>
      <div class="sub">Field capture</div>
    </div>
    <div class="tally"><span id="tallyNum" style="display:block;font-size:30px;color:var(--paper);text-align:right">0</span><span>Items</span></div>
  </div>

  <div class="hdr">
    <div>
      <label class="lbl" for="fProj">Project</label>
      <input id="fProj" placeholder="CORA Merrick Park">
    </div>
    <div>
      <label class="lbl" for="fDate">Visit date</label>
      <input id="fDate" type="date">
    </div>
    <div style="grid-column:1/-1">
      <label class="lbl" for="fBy">Observed by</label>
      <input id="fBy" placeholder="Alfonso Orozco">
    </div>
  </div>

  <div class="capture">
    <label for="camIn" class="btn btn-primary" style="text-align:center">Take photo</label>
    <input id="camIn" type="file" accept="image/*" capture="environment">
    <div style="height:8px"></div>
    <label for="libIn" class="btn btn-ghost" style="text-align:center">Add from gallery</label>
    <input id="libIn" type="file" accept="image/*" multiple>
  </div>

  <div class="status" id="status"></div>
  <div class="entries" id="entries"></div>

  <div class="note">Data stays on this device. Export the PDF before clearing.</div>

  <div class="foot">
    <div class="btn-row">
      <button class="btn btn-dark" id="btnPdf">Export PDF</button>
      <button class="btn btn-ghost" id="btnClear" style="flex:0 0 96px">Clear</button>
    </div>
  </div>
</div>

<div class="sheet" id="sheet" style="display:none">
  <div class="sheet-top">
    <button id="shCancel">Cancel</button>
    <h2>Mark up &amp; describe</h2>
    <button id="shSave">Save</button>
  </div>
  <div class="canvas-wrap" id="cwrap"><canvas id="cv"></canvas></div>
  <div class="tools">
    <button class="t on" id="tDraw">Draw</button>
    <button class="t" id="tUndo">Undo</button>
    <button class="t" id="tClear">Clear marks</button>
  </div>
  <div class="form">
    <div>
      <label class="lbl" for="eZone">Zone / location</label>
      <input id="eZone" placeholder="Building 12">
      <div class="chips" id="zoneChips"></div>
    </div>
    <div>
      <label class="lbl" for="eCmt">Observation</label>
      <textarea id="eCmt" placeholder="Palm needs to move approx 2ft east"></textarea>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function(){
  var KEY='svr_state_v1';
  var state={proj:'',date:'',by:'',items:[]};
  var strokes=[], cur=null, baseImg=null, editing=null;

  /* ---------- storage shim: works inside Claude artifacts and standalone ---------- */
  var store={
    get:async function(){
      try{ if(window.storage&&window.storage.get){var r=await window.storage.get(KEY,false);return r&&r.value?JSON.parse(r.value):null;} }catch(e){}
      try{ var s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; }
    },
    set:async function(v){
      var s=JSON.stringify(v);
      try{ if(window.storage&&window.storage.set){ await window.storage.set(KEY,s,false); return; } }catch(e){}
      try{ localStorage.setItem(KEY,s); }catch(e){ flash('Storage full - export the PDF now'); }
    }
  };

  var $=function(id){return document.getElementById(id)};
  function flash(m){ $('status').textContent=m; setTimeout(function(){ if($('status').textContent===m) $('status').textContent=''; },3500); }

  /* ---------- load ---------- */
  (async function(){
    var s=await store.get();
    if(s){ state=s; }
    if(!state.date) state.date=new Date().toISOString().slice(0,10);
    $('fProj').value=state.proj||''; $('fDate').value=state.date; $('fBy').value=state.by||'';
    render();
  })();

  ['fProj','fDate','fBy'].forEach(function(id){
    $(id).addEventListener('input',function(){
      state.proj=$('fProj').value; state.date=$('fDate').value; state.by=$('fBy').value;
      $('mastTitle').textContent=state.proj||'Site Visit Report';
      store.set(state);
    });
  });

  /* ---------- photo intake ---------- */
  function handleFiles(files){
    var list=Array.prototype.slice.call(files);
    if(!list.length) return;
    (function next(i){
      if(i>=list.length) return;
      readImage(list[i],function(){ next(i+1); });
    })(0);
  }
  $('camIn').addEventListener('change',function(e){ handleFiles(e.target.files); e.target.value=''; });
  $('libIn').addEventListener('change',function(e){ handleFiles(e.target.files); e.target.value=''; });

  function readImage(file,done){
    var fr=new FileReader();
    fr.onload=function(){
      var img=new Image();
      img.onload=function(){
        var MAX=1500, w=img.width, h=img.height;
        if(Math.max(w,h)>MAX){ var k=MAX/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        openEditor(c.toDataURL('image/jpeg',0.72), file.lastModified||Date.now(), null);
        if(done) done();
      };
      img.onerror=function(){ flash('That file would not open as an image'); if(done)done(); };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  }

  /* ---------- editor ---------- */
  var cv=$('cv'), ctx=cv.getContext('2d');
  function openEditor(dataUrl,ts,existing){
    editing = existing || {id:Date.now()+'_'+Math.random().toString(36).slice(2), src:dataUrl, ts:ts, zone:'', cmt:''};
    strokes=[]; cur=null;
    baseImg=new Image();
    baseImg.onload=function(){
      var maxW=Math.min(window.innerWidth,560);
      var maxH=Math.round(window.innerHeight*0.44);
      var k=Math.min(maxW/baseImg.width, maxH/baseImg.height, 1);
      cv.width=Math.round(baseImg.width*k); cv.height=Math.round(baseImg.height*k);
      redraw();
      $('sheet').style.display='flex';
      $('eZone').value=editing.zone||''; $('eCmt').value=editing.cmt||'';
      buildChips();
    };
    baseImg.src=editing.src;
  }
  function redraw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.drawImage(baseImg,0,0,cv.width,cv.height);
    ctx.strokeStyle='#e11d1d'; ctx.lineWidth=Math.max(3,cv.width/110);
    ctx.lineCap='round'; ctx.lineJoin='round';
    strokes.concat(cur?[cur]:[]).forEach(function(s){
      if(s.length<2) return;
      ctx.beginPath(); ctx.moveTo(s[0].x,s[0].y);
      for(var i=1;i<s.length;i++) ctx.lineTo(s[i].x,s[i].y);
      ctx.stroke();
    });
  }
  function pt(e){ var r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)}; }
  cv.addEventListener('pointerdown',function(e){ e.preventDefault(); cv.setPointerCapture(e.pointerId); cur=[pt(e)]; });
  cv.addEventListener('pointermove',function(e){ if(!cur) return; e.preventDefault(); cur.push(pt(e)); redraw(); });
  cv.addEventListener('pointerup',function(){ if(cur&&cur.length>1) strokes.push(cur); cur=null; redraw(); });
  cv.addEventListener('pointercancel',function(){ cur=null; redraw(); });

  $('tUndo').addEventListener('click',function(){ strokes.pop(); redraw(); });
  $('tClear').addEventListener('click',function(){ strokes=[]; redraw(); });

  $('shCancel').addEventListener('click',function(){ $('sheet').style.display='none'; editing=null; });

  $('shSave').addEventListener('click',function(){
    if(!$('eCmt').value.trim()){ $('eCmt').focus(); flash('Add an observation before saving'); return; }
    // flatten annotations at full source resolution
    var out=document.createElement('canvas');
    out.width=baseImg.width; out.height=baseImg.height;
    var o=out.getContext('2d');
    o.drawImage(baseImg,0,0);
    var sc=baseImg.width/cv.width;
    o.strokeStyle='#e11d1d'; o.lineWidth=Math.max(3,cv.width/110)*sc; o.lineCap='round'; o.lineJoin='round';
    strokes.forEach(function(s){
      o.beginPath(); o.moveTo(s[0].x*sc,s[0].y*sc);
      for(var i=1;i<s.length;i++) o.lineTo(s[i].x*sc,s[i].y*sc);
      o.stroke();
    });
    editing.src=out.toDataURL('image/jpeg',0.72);
    editing.zone=$('eZone').value.trim();
    editing.cmt=$('eCmt').value.trim();
    var i=state.items.findIndex(function(x){return x.id===editing.id});
    if(i>=0) state.items[i]=editing; else state.items.push(editing);
    store.set(state);
    $('sheet').style.display='none'; editing=null;
    render();
  });

  function buildChips(){
    var seen=[], box=$('zoneChips'); box.innerHTML='';
    state.items.forEach(function(it){ if(it.zone && seen.indexOf(it.zone)<0) seen.push(it.zone); });
    seen.slice(-6).forEach(function(z){
      var b=document.createElement('button'); b.className='chip'; b.textContent=z;
      b.onclick=function(){ $('eZone').value=z; };
      box.appendChild(b);
    });
  }

  /* ---------- list ---------- */
  function fmt(ts){ var d=new Date(ts); return d.toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
  function render(){
    $('tallyNum').textContent=state.items.length;
    $('mastTitle').textContent=state.proj||'Site Visit Report';
    var e=$('entries');
    if(!state.items.length){ e.innerHTML='<div class="empty"><strong>No items yet</strong>Take a photo, circle what matters, write the note. Do it standing in front of the issue.</div>'; return; }
    e.innerHTML='';
    state.items.forEach(function(it,i){
      var d=document.createElement('div'); d.className='row';
      var n=document.createElement('div'); n.className='idx'; n.textContent=String(i+1).padStart(2,'0');
      var im=document.createElement('img'); im.src=it.src; im.onclick=function(){ openEditor(it.src,it.ts,it); };
      var b=document.createElement('div'); b.className='body';
      b.innerHTML='<div class="zone">'+esc(it.zone||'Unassigned')+'</div><div class="cmt">'+esc(it.cmt)+'</div><div class="time">'+fmt(it.ts)+'</div>';
      var k=document.createElement('button'); k.className='kill'; k.textContent='Remove';
      k.onclick=function(){ state.items=state.items.filter(function(x){return x.id!==it.id}); store.set(state); render(); };
      b.appendChild(k);
      d.appendChild(n); d.appendChild(im); d.appendChild(b);
      e.appendChild(d);
    });
  }
  function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]}); }

  $('btnClear').addEventListener('click',function(){
    if(!state.items.length) return;
    if(confirm('Delete all '+state.items.length+' items? Export first if you need the PDF.')){
      state.items=[]; store.set(state); render();
    }
  });

  /* ---------- PDF ---------- */
  $('btnPdf').addEventListener('click',function(){
    if(!state.items.length){ flash('Nothing to export yet'); return; }
    flash('Building PDF...');
    setTimeout(buildPdf,60);
  });

  function buildPdf(){
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({unit:'pt',format:'letter'});
    var W=612, H=792, M=48, y=M;
    var proj=state.proj||'Site Visit Report';

    function header(){
      doc.setFillColor(18,22,28); doc.rect(0,0,W,4,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(18,22,28);
      doc.text('Site Visit Report',M,42);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(110,100,88);
      doc.text(proj,M,56);
      var r=[];
      if(state.date) r.push(state.date);
      if(state.by) r.push(state.by);
      doc.text(r.join('   |   '),W-M,42,{align:'right'});
      doc.setDrawColor(200,195,182); doc.line(M,68,W-M,68);
      return 88;
    }
    function foot(p,tot){
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(140,132,120);
      doc.text('Page '+p+' of '+tot,W/2,H-30,{align:'center'});
    }

    y=header();
    // table head
    doc.setFillColor(232,228,219); doc.rect(M,y,W-2*M,20,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(60,56,50);
    doc.text('#',M+8,y+13); doc.text('ZONE',M+28,y+13); doc.text('PHOTO',M+140,y+13); doc.text('OBSERVATION',M+230,y+13);
    y+=20;

    var TH=64, TW=80;
    state.items.forEach(function(it,i){
      if(y+TH+16>H-56){ doc.addPage(); y=header(); }
      doc.setDrawColor(210,205,194); doc.line(M,y,W-M,y);
      var ty=y+12;
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(18,22,28);
      doc.text(String(i+1),M+8,ty+8);
      doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.text(doc.splitTextToSize(it.zone||'Unassigned',100),M+28,ty+8);
      try{ doc.addImage(it.src,'JPEG',M+140,ty,TW,TH); }catch(e){}
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(30,34,40);
      doc.text(doc.splitTextToSize(it.cmt,W-M-(M+230)),M+230,ty+9);
      doc.setFontSize(7.5); doc.setTextColor(150,142,130);
      doc.text(fmt(it.ts),M+230,ty+TH+2);
      y+=TH+22;
    });

    // full-size appendix
    state.items.forEach(function(it,i){
      doc.addPage(); y=header();
      doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(18,22,28);
      doc.text('Item '+(i+1)+' - '+(it.zone||'Unassigned'),M,y);
      y+=14;
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(40,44,50);
      var lines=doc.splitTextToSize(it.cmt,W-2*M);
      doc.text(lines,M,y); y+=lines.length*13+10;
      var props;
      try{ props=doc.getImageProperties(it.src); }catch(e){ props={width:4,height:3}; }
      var availW=W-2*M, availH=H-y-60;
      var k=Math.min(availW/props.width, availH/props.height);
      var w=props.width*k, h=props.height*k;
      try{ doc.addImage(it.src,'JPEG',M+(availW-w)/2,y,w,h); }catch(e){}
      doc.setFontSize(7.5); doc.setTextColor(150,142,130);
      doc.text(fmt(it.ts),M,H-46);
    });

    var tot=doc.getNumberOfPages();
    for(var p=1;p<=tot;p++){ doc.setPage(p); foot(p,tot); }

    var name=(proj.replace(/[^a-z0-9]+/gi,'-')+'-'+(state.date||'')+'.pdf').toLowerCase();
    doc.save(name);
    flash('PDF exported');
  }
})();
</script>
