<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14202b">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --mark:#7ba7af;
    --ink:#14202b;
    --paper:#f5f4f1;
    --line:#d6d5d0;
    --dim:#6d7680;
    --flag:#c8352a;
    --bg:#f5f4f1;
    --text:#14202b;
    --card:#ffffff;
    --border:#d6d5d0;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --mark:#7ba7af;
      --ink:#e8e6e0;
      --paper:#1a1a1a;
      --line:#333333;
      --dim:#999999;
      --flag:#e8554a;
      --bg:#1a1a1a;
      --text:#e8e6e0;
      --card:#2a2a2a;
      --border:#444444;
    }
    .svr input,.svr textarea,.svr select{
      background:#2a2a2a;
      color:#e8e6e0;
      border-color:#444444;
    }
    .chip{
      background:#2a2a2a;
      border-color:#444444;
      color:#e8e6e0;
    }
    .chip.on{
      background:var(--ink);
      color:var(--mark);
      border-color:var(--ink);
    }
    .locbtn{
      background:#2a2a2a;
      border-color:#444444;
      color:#e8e6e0;
    }
    .foot{
      background:#1a1a1a;
      border-top-color:#333333;
    }
    .sheet{
      background:#1a1a1a;
    }
    .hdr{
      border-bottom-color:#333333;
    }
    .row{
      border-bottom-color:#333333;
    }
    .row img{
      border-color:#444444;
      background:#2a2a2a;
    }
    .empty strong{
      color:#e8e6e0;
    }
    .zoneband{
      background:#2a2a2a;
      color:var(--mark);
    }
    .mast{
      background:#0d0d0d;
      color:#e8e6e0;
    }
    .mast .sub{
      color:#666666;
    }
    .btn-ghost{
      color:#e8e6e0;
      border-color:#444444;
    }
    .btn-dark{
      background:#2a2a2a;
      color:#e8e6e0;
    }
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  .svr{
    font-family:'Archivo',system-ui,sans-serif;
    color:var(--text);background:var(--bg);
    max-width:560px;margin:0 auto;padding:0 0 120px;min-height:100vh;
  }
  .svr h1,.svr h2{margin:0}

  .mast{background:var(--ink);color:var(--paper);padding:16px 18px}
  .mast .brandrow{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid rgba(123,167,175,.35)}
  .mast svg{width:20px;height:auto;flex:none}
  .mast .wm{font-size:12px;letter-spacing:.34em;text-transform:uppercase;font-weight:600;color:var(--mark)}
  .mast .btm{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding-top:12px}
  .mast h1{font-size:18px;font-weight:800;letter-spacing:-.015em;line-height:1.15}
  .mast .sub{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#7e8a94;margin-top:5px}
  .tally{font-family:'IBM Plex Mono',monospace;text-align:right;line-height:1}
  .tally b{display:block;font-size:28px;font-weight:500;color:var(--mark)}
  .tally span{display:block;font-size:8.5px;letter-spacing:.16em;color:#7e8a94;margin-top:4px}

  .hdr{padding:14px 18px;border-bottom:2px solid var(--line);display:grid;grid-template-columns:1fr 132px;gap:10px}
  label.lbl{display:block;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600}
  .svr input,.svr textarea,.svr select{
    width:100%;font-family:'Archivo',sans-serif;font-size:15px;color:var(--text);
    background:var(--card);border:1px solid var(--line);border-radius:2px;padding:9px 10px;
  }
  .svr textarea{resize:vertical;min-height:74px;line-height:1.4}
  .svr input:focus,.svr textarea:focus,.svr select:focus{outline:2px solid var(--mark);outline-offset:0;border-color:var(--mark)}

  .btn{display:block;width:100%;border:0;border-radius:2px;padding:15px;
    font-family:'Archivo',sans-serif;font-size:13.5px;font-weight:700;letter-spacing:.09em;
    text-transform:uppercase;cursor:pointer}
  .btn-primary{background:var(--mark);color:#0d1a22}
  .btn-primary:active{background:#6b959d}
  .btn-dark{background:var(--ink);color:var(--paper)}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btn-row{display:flex;gap:8px}
  .btn-row .btn{flex:1}

  .capture{padding:16px 18px;border-bottom:1px solid var(--line)}
  input[type=file]{display:none}

  .empty{padding:44px 24px;text-align:center;color:var(--dim);font-size:14px;line-height:1.5}
  .empty strong{display:block;color:var(--text);font-weight:700;margin-bottom:6px}

  .zoneband{background:var(--ink);color:var(--mark);padding:6px 18px;
    font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:700}
  .row{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);align-items:flex-start}
  .row .idx{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);width:22px;padding-top:2px;flex:none}
  .row img{width:74px;height:74px;object-fit:cover;border:1px solid var(--line);flex:none;background:#e4e3de}
  .row .body{flex:1;min-width:0}
  .row .cmt{font-size:14px;line-height:1.35;word-wrap:break-word}
  .row .time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:5px}
  .row .pin{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;
    color:#0d1a22;background:var(--mark);padding:2px 5px;border-radius:2px;margin-top:5px}
  .row .kill{border:0;background:none;color:var(--flag);font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 0 0;cursor:pointer;text-transform:uppercase}

  .foot{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;
    padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:var(--bg);border-top:2px solid var(--line)}

  .sheet{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;max-width:560px;margin:0 auto}
  .sheet-top{background:var(--ink);color:var(--paper);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .sheet-top h2{font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:var(--mark)}
  .sheet-top button{background:none;border:0;color:var(--paper);font-size:12.5px;font-weight:700;letter-spacing:.09em;cursor:pointer;text-transform:uppercase}
  .sheet-top .rotate-btn{background:rgba(255,255,255,0.1);border-radius:4px;padding:6px 12px;font-size:11px;color:var(--mark)}
  .canvas-wrap{background:#0a1219;display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden}
  canvas{max-width:100%;touch-action:none;display:block}
  .tools{display:flex;gap:6px;padding:9px 12px;background:#101a23}
  .tools .t{flex:1;background:#22303c;color:#c7d3d8;border:0;border-radius:2px;padding:11px 4px;
    font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:'Archivo',sans-serif}
  .tools .t.on{background:var(--flag);color:#fff}
  .tools .t.on.blk{background:#c7d3d8;color:#101a23}
  .form{padding:14px 16px;overflow-y:auto;flex:1}
  .form > div{margin-bottom:12px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 9px;border:1px solid var(--line);background:var(--card);border-radius:2px;cursor:pointer;color:var(--text)}
  .chip.on{background:var(--ink);color:var(--mark);border-color:var(--ink)}
  .chip.miss{opacity:.4}
  .locbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    background:var(--card);border:1px solid var(--line);border-radius:2px;padding:11px 10px;cursor:pointer;
    font-family:'Archivo',sans-serif;font-size:14px;color:var(--text);text-align:left}
  .locbtn em{font-style:normal;font-family:'Archivo',sans-serif;font-size:13px;color:var(--dim);font-weight:400}
  .form input,
  .form textarea,
  .form .locbtn {
    width:100%;
    box-sizing:border-box;
  }
  .plchips{display:flex;gap:6px;overflow-x:auto;padding:9px 12px;background:#101a23;-webkit-overflow-scrolling:touch}
  .plchips .chip{flex:none;background:#22303c;border-color:#22303c;color:#c7d3d8}
  .plchips .chip.on{background:var(--mark);border-color:var(--mark);color:#0d1a22}
  .note{font-size:11px;color:var(--dim);line-height:1.45;padding:10px 18px}
  .status{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mark);padding:8px 18px 0;min-height:20px}
</style>

<div class="svr">
  <div class="mast">
    <div class="brandrow">
      <svg viewBox="0 0 360 331.73" xmlns="http://www.w3.org/2000/svg"><path fill="#7ba7af" d="M246.61,0H113.39L0,331.73h360L246.61,0ZM177.17,21.57h5.66l87.73,257.02H89.43L177.17,21.57Z"/></svg>
      <span class="wm">Constellation</span>
    </div>
    <div class="btm">
      <div>
        <h1 id="mastTitle">Site Visit Report</h1>
        <div class="sub" id="mastSub">Field observation record</div>
      </div>
      <div class="tally"><b id="tallyNum">0</b><span>Items</span></div>
    </div>
  </div>

  <div class="hdr">
    <div>
      <label class="lbl" for="fProj">Project</label>
      <input id="fProj" placeholder="CORA Merrick Park">
    </div>
    <div>
      <label class="lbl" for="fDate">Visit date</label>
      <input id="fDate" type="date">
    </div>
    <div>
      <label class="lbl" for="fBy">Observed by</label>
      <input id="fBy" placeholder="Alfonso Orozco">
    </div>
    <div>
      <label class="lbl" for="fRef">Report no.</label>
      <input id="fRef" placeholder="SVR-20260721-A">
    </div>
    <div style="grid-column:1/-1">
      <label class="lbl" for="fTo">Issued to</label>
      <input id="fTo" placeholder="Winmar Construction - Luis Alfonzo">
    </div>
  </div>

  <div class="capture">
    <label for="camIn" class="btn btn-primary" style="text-align:center">Take photo</label>
    <input id="camIn" type="file" accept="image/*" capture="environment">
    <div style="height:8px"></div>
    <label for="libIn" class="btn btn-ghost" style="text-align:center">Add from gallery</label>
    <input id="libIn" type="file" accept="image/*" multiple>
  </div>

  <div class="status" id="status"></div>
  <div class="entries" id="entries"></div>

  <div class="note">Data stays on this device. Export the PDF and file it before clearing. Item numbers are permanent - deleting an item leaves a gap rather than renumbering.</div>

  <div class="foot">
    <div class="btn-row">
      <button class="btn btn-dark" id="btnPdf">Export PDF</button>
      <button class="btn btn-ghost" id="btnShare" style="flex:0 0 80px">Share</button>
      <button class="btn btn-ghost" id="btnClear" style="flex:0 0 80px">Clear</button>
    </div>
  </div>
</div>

<div class="sheet" id="sheet" style="display:none">
  <div class="sheet-top">
    <button id="shCancel">Cancel</button>
    <h2>Mark up</h2>
    <div>
      <button class="rotate-btn" id="shRotate">↻ Rotate</button>
      <button id="shSave">Save</button>
    </div>
  </div>
  <div class="canvas-wrap"><canvas id="cv"></canvas></div>
  <div class="tools">
    <button class="t on" id="tDraw">Circle</button>
    <button class="t blk" id="tBox">Black out</button>
    <button class="t" id="tUndo">Undo</button>
    <button class="t" id="tClear">Clear</button>
  </div>
  <div class="form">
    <div>
      <label class="lbl" for="eZone">Zone / location</label>
      <input id="eZone" placeholder="Building 12">
      <div class="chips" id="zoneChips"></div>
    </div>
    <div>
      <label class="lbl">Location on plan</label>
      <button class="locbtn" id="eLoc"><span id="eLocTxt">Not set</span><em>Set pin</em></button>
    </div>
    <div>
      <label class="lbl" for="eCmt">Observation</label>
      <textarea id="eCmt" placeholder="Palm needs to move approx 2ft east"></textarea>
    </div>
  </div>
</div>

<div class="sheet" id="plansheet" style="display:none;z-index:60">
  <div class="sheet-top">
    <button id="plCancel">Cancel</button>
    <h2>Location on plan</h2>
    <button id="plSave">Save</button>
  </div>
  <div class="plchips" id="plChips"></div>
  <div class="canvas-wrap" style="flex:1"><canvas id="pcv"></canvas></div>
  <div class="tools">
    <button class="t" id="plClearPin">Remove pin</button>
  </div>
  <div class="note" id="plNote">Pinch to zoom. Tap the plan to drop a pin.</div>
</div>

<script src="jspdf.umd.min.js"></script>
<script>
(function(){

  /* ==========================================================
     FLOOR PLAN LIBRARY
     ========================================================== */
  const PLAN_DIR='plans/';
  const PLANS=[
    {id:'101', label:'101', file:'101.jpg'},
    {id:'102', label:'102', file:'102.jpg'},
    {id:'103', label:'103', file:'103.jpg'},
    {id:'103a', label:'103A', file:'103a.jpg'},
    {id:'104', label:'104', file:'104.jpg'},
    {id:'105', label:'105', file:'105.jpg'},
    {id:'106', label:'106', file:'106.jpg'},
    {id:'107', label:'107', file:'107.jpg'},
    {id:'108', label:'108', file:'108.jpg'},
    {id:'109', label:'109', file:'109.jpg'},
    {id:'110', label:'110', file:'110.jpg'},
    {id:'111', label:'111', file:'111.jpg'},
    {id:'112', label:'112', file:'112.jpg'},
    {id:'113', label:'113', file:'113.jpg'},
    {id:'114', label:'114', file:'114.jpg'}
  ];

  /* ==========================================================
     CANONICAL ZONE LIST
     ========================================================== */
  const ZONES={
    'cora merrick park':[
      'Site / Perimeter','Garage','Lobby','Amenity Deck',
      'Level 02','Level 03','Level 04','Level 05','Level 06',
      'Roof','MEP','Landscape'
    ]
  };

  const BUILD='2026-07-21-b';
  const KEY='svr_state_v1';

  let state={proj:'',date:'',by:'',ref:'',refAuto:true,to:'',seq:0,items:[]};
  let marks=[], cur=null, baseImg=null, editing=null, mode='pen', pending=[];
  let origSrc=null; // pristine, unrotated image for the current editing session
  let editPlan=null;
  let plDraft=null, plImg=null, plId=null;
  let rotation=0; // Track rotation in degrees

  const LOGO_D='M246.61,0H113.39L0,331.73h360L246.61,0ZM177.17,21.57h5.66l87.73,257.02H89.43L177.17,21.57Z';
  let logoPng=null;
  function makeLogo(hex,scale){
    const c=document.createElement('canvas');
    c.width=Math.round(360*scale); c.height=Math.round(331.73*scale);
    const x=c.getContext('2d'); x.scale(scale,scale);
    x.fillStyle=hex; x.fill(new Path2D(LOGO_D));
    return c.toDataURL('image/png');
  }
  try{ logoPng=makeLogo('#7ba7af',0.6); }catch(e){ logoPng=null; }

  const store={
    get:async function(){
      try{ if(window.storage&&window.storage.get){const r=await window.storage.get(KEY,false);return r&&r.value?JSON.parse(r.value):null;} }catch(e){}
      try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; }
    },
    set:async function(v){
      const s=JSON.stringify(v);
      try{ if(window.storage&&window.storage.set){ await window.storage.set(KEY,s,false); return; } }catch(e){}
      try{ localStorage.setItem(KEY,s); }catch(e){ flash('Storage full - export the PDF now'); }
    }
  };

  const $=function(id){return document.getElementById(id)};

  let saveTimeout = null;
  function saveState(){
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(function(){
      store.set(state);
    }, 300);
  }

  function flash(m){ $('status').textContent=m; setTimeout(function(){ if($('status').textContent===m) $('status').textContent=''; },3500); }

  function checkStorage(){
    try{
      let total=0;
      for(let key in localStorage){
        if(localStorage.hasOwnProperty(key)){
          total += localStorage[key].length * 2;
        }
      }
      const MB = total / (1024 * 1024);
      if(MB > 7){
        flash('Storage: '+MB.toFixed(1)+'MB used. Export PDF and clear soon.');
      }
    }catch(e){}
  }

  function todayLocal(){
    const d=new Date();
    const p=function(n){return String(n).padStart(2,'0')};
    return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
  }
  function autoRef(dateStr){
    return 'SVR-'+String(dateStr||todayLocal()).replace(/-/g,'')+'-A';
  }
  function planById(id){ for(let i=0;i<PLANS.length;i++) if(PLANS[i].id===id) return PLANS[i]; return null; }
  function planLabel(p){ const d=p&&planById(p.id); return d?d.label:(p?p.id:''); }

  (async function(){
    const s=await store.get();
    if(s) state=Object.assign(state,s);
    if(!state.date) state.date=todayLocal();

    let maxNo=state.seq||0;
    state.items.forEach(function(it){ if(typeof it.no==='number' && it.no>maxNo) maxNo=it.no; });
    state.items.forEach(function(it){ if(typeof it.no!=='number'){ maxNo++; it.no=maxNo; } });
    state.seq=maxNo;

    if(!state.ref){ state.ref=autoRef(state.date); state.refAuto=true; }
    $('fProj').value=state.proj||''; $('fDate').value=state.date;
    $('fBy').value=state.by||''; $('fRef').value=state.ref||''; $('fTo').value=state.to||'';
    store.set(state);
    render();
    checkStorage();
  })();

  $('mastSub').textContent='Field observation record  /  Build '+BUILD;

  if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('sw.js',{updateViaCache:'none'})
        .then(function(reg){
          reg.update();
          document.addEventListener('visibilitychange',function(){
            if(!document.hidden && navigator.onLine) reg.update();
          });
        })
        .catch(function(){});
    });
  }
  window.addEventListener('offline',function(){ flash('Offline - capture and export still work'); });
  window.addEventListener('online',function(){ flash('Back online'); });

  $('fRef').addEventListener('input',function(){ state.refAuto=false; });
  ['fProj','fDate','fBy','fRef','fTo'].forEach(function(id){
    $(id).addEventListener('input',function(){
      state.proj=$('fProj').value; state.date=$('fDate').value; state.by=$('fBy').value;
      state.ref=$('fRef').value; state.to=$('fTo').value;
      if(state.refAuto){ state.ref=autoRef(state.date); $('fRef').value=state.ref; }
      $('mastTitle').textContent=state.proj||'Site Visit Report';
      saveState();
    });
  });
  $('fProj').addEventListener('change', function(){ buildChips(); });
  
  function handleFiles(files){
    const list=Array.prototype.slice.call(files);
    if(!list.length) return;
    if(list.length>1) flash('Adding '+list.length+' photos, one at a time');
    pending=list.slice(1);
    readImage(list[0]);
  }
  $('camIn').addEventListener('change',function(e){ pending=[]; handleFiles(e.target.files); e.target.value=''; });
  $('libIn').addEventListener('change',function(e){ pending=[]; handleFiles(e.target.files); e.target.value=''; });

  function readImage(file){
    const fr=new FileReader();
    fr.onload=function(){
      const img=new Image();
      img.onload=function(){
        let MAX=1500, w=img.width, h=img.height;
        if(Math.max(w,h)>MAX){ const k=MAX/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        openEditor(c.toDataURL('image/jpeg',0.65), file.lastModified||Date.now(), null);
      };
      img.onerror=function(){ flash('That file would not open as an image'); nextPending(); };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  }
  function nextPending(){ if(pending.length) readImage(pending.shift()); }

  /* ---------------- markup canvas ---------------- */
  const cv=$('cv'), ctx=cv.getContext('2d');
  function penW(){ return Math.max(2.2, cv.width/165); }

  function rotateImage(dataUrl, degrees, cb){
    const img=new Image();
    img.onload=function(){
      const rad=degrees*Math.PI/180;
      const w=img.width, h=img.height;
      let cw, ch;
      if(degrees===90 || degrees===270){ cw=h; ch=w; }
      else{ cw=w; ch=h; }
      const c=document.createElement('canvas');
      c.width=cw; c.height=ch;
      const x=c.getContext('2d');
      x.translate(cw/2, ch/2);
      x.rotate(rad);
      x.drawImage(img, -w/2, -h/2);
      cb(c.toDataURL('image/jpeg',0.72));
    };
    img.src=dataUrl;
  }

  function loadBaseImg(src,cb){
    baseImg=new Image();
    baseImg.onload=function(){
      const maxW=Math.min(window.innerWidth*1.5,840);
      const maxH=Math.round(window.innerHeight*0.6);
      const k=Math.min(maxW/baseImg.width, maxH/baseImg.height, 1);
      cv.width=Math.round(baseImg.width*k); cv.height=Math.round(baseImg.height*k);
      redraw();
      if(cb) cb();
    };
    baseImg.src=src;
  }

  function openEditor(dataUrl,ts,existing){
    rotation=0;
    editing = existing || {id:Date.now()+'_'+Math.random().toString(36).slice(2), src:dataUrl, ts:ts, zone:'', cmt:'', plan:null, no:null};
    origSrc = editing.src;
    editPlan = editing.plan ? {id:editing.plan.id,x:editing.plan.x,y:editing.plan.y} : null;
    marks=[]; cur=null; setMode('pen');
    loadBaseImg(editing.src,function(){
      $('sheet').style.display='flex';
      $('eZone').value=editing.zone||''; $('eCmt').value=editing.cmt||'';
      buildChips(); updateLocBtn();
    });
  }

  function paint(c,scale){
    c.lineCap='round'; c.lineJoin='round';
    marks.concat(cur?[cur]:[]).forEach(function(m){
      if(m.type==='rect'){
        c.fillStyle='#0a0a0a';
        c.fillRect(Math.min(m.x,m.x2)*scale, Math.min(m.y,m.y2)*scale,
                   Math.abs(m.x2-m.x)*scale, Math.abs(m.y2-m.y)*scale);
      }else{
        if(m.pts.length<2) return;
        c.strokeStyle='#e11d1d'; c.lineWidth=penW()*scale;
        c.beginPath(); c.moveTo(m.pts[0].x*scale,m.pts[0].y*scale);
        for(let i=1;i<m.pts.length;i++) c.lineTo(m.pts[i].x*scale,m.pts[i].y*scale);
        c.stroke();
      }
    });
  }

  let redrawPending = false;
  function redraw(){
    if(redrawPending) return;
    redrawPending = true;
    requestAnimationFrame(function(){
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.drawImage(baseImg,0,0,cv.width,cv.height);
      paint(ctx,1);
      redrawPending = false;
    });
  }

  function pt(e,el){ const r=el.getBoundingClientRect(); return {x:(e.clientX-r.left)*(el.width/r.width), y:(e.clientY-r.top)*(el.height/r.height)}; }

  cv.addEventListener('pointerdown',function(e){
    e.preventDefault(); cv.setPointerCapture(e.pointerId);
    const p=pt(e,cv);
    cur = mode==='rect' ? {type:'rect',x:p.x,y:p.y,x2:p.x,y2:p.y} : {type:'pen',pts:[p]};
  });
  cv.addEventListener('pointermove',function(e){
    if(!cur) return; e.preventDefault(); const p=pt(e,cv);
    if(cur.type==='rect'){ cur.x2=p.x; cur.y2=p.y; } else cur.pts.push(p);
    redraw();
  });
  cv.addEventListener('pointerup',function(){
    if(cur){
      if(cur.type==='rect'){ if(Math.abs(cur.x2-cur.x)>6&&Math.abs(cur.y2-cur.y)>6) marks.push(cur); }
      else if(cur.pts.length>1) marks.push(cur);
    }
    cur=null; redraw();
  });
  cv.addEventListener('pointercancel',function(){ cur=null; redraw(); });

  function setMode(m){ mode=m; $('tDraw').classList.toggle('on',m==='pen'); $('tBox').classList.toggle('on',m==='rect'); }
  $('tDraw').addEventListener('click',function(){ setMode('pen'); });
  $('tBox').addEventListener('click',function(){ setMode('rect'); });
  $('tUndo').addEventListener('click',function(){ marks.pop(); redraw(); });
  $('tClear').addEventListener('click',function(){ marks=[]; redraw(); });
  $('shCancel').addEventListener('click',function(){ $('sheet').style.display='none'; editing=null; nextPending(); });

  // Rotate button - always rotate the pristine origSrc by the cumulative
  // angle (not the already-rotated src) so repeated presses don't
  // over-rotate. Marks drawn before rotating are tied to the old canvas
  // orientation, so they're cleared rather than repainted crooked.
  $('shRotate').addEventListener('click',function(){
    if(!origSrc) return;
    rotation = (rotation + 90) % 360;
    const hadMarks = marks.length>0;
    marks=[]; cur=null;
    rotateImage(origSrc, rotation, function(rotatedDataUrl){
      editing.src = rotatedDataUrl;
      loadBaseImg(rotatedDataUrl);
      if(hadMarks) flash('Rotated - marks were cleared, re-mark the photo');
    });
  });

  $('shSave').addEventListener('click',function(){
    if(!$('eCmt').value.trim()){ $('eCmt').focus(); flash('Add an observation before saving'); return; }
    const out=document.createElement('canvas');
    out.width=baseImg.width; out.height=baseImg.height;
    const o=out.getContext('2d');
    o.drawImage(baseImg,0,0);
    paint(o, baseImg.width/cv.width);
    editing.src=out.toDataURL('image/jpeg',0.72);
    
    // Create thumbnail for PDF summary table
    const thumbCanvas = document.createElement('canvas');
    thumbCanvas.width = 150; thumbCanvas.height = 150;
    const tCtx = thumbCanvas.getContext('2d');
    // Draw from baseImg (the original photo) not 'out' (which has markup)
    tCtx.drawImage(baseImg, 0, 0, 150, 150);
    editing.thumb = thumbCanvas.toDataURL('image/jpeg', 0.5);
    
    editing.zone=$('eZone').value.trim();
    editing.cmt=$('eCmt').value.trim();
    editing.plan=editPlan?{id:editPlan.id,x:editPlan.x,y:editPlan.y}:null;
    const i=state.items.findIndex(function(x){return x.id===editing.id});
    if(i>=0){ state.items[i]=editing; }
    else{
      state.seq=(state.seq||0)+1;
      editing.no=state.seq;
      state.items.push(editing);
    }
    store.set(state);
    buildChips();
    $('sheet').style.display='none'; editing=null; editPlan=null;
    render(); nextPending();
    checkStorage();
  });

  function projZones(){
    const k=(state.proj||'').trim().toLowerCase();
    return ZONES[k]||[];
  }
  function buildChips(){
    const box=$('zoneChips'); box.innerHTML='';
    const seen=projZones().slice();
    state.items.forEach(function(it){ if(it.zone && seen.indexOf(it.zone)<0) seen.push(it.zone); });
    seen.forEach(function(z){
      const b=document.createElement('button'); b.className='chip'; b.textContent=z;
      if($('eZone').value===z) b.classList.add('on');
      b.onclick=function(){ $('eZone').value=z; buildChips(); };
      box.appendChild(b);
    });
  }

  /* ---------------- plan pin sheet with pinch-zoom ---------------- */
  const pcv=$('pcv'), pctx=pcv.getContext('2d');
  const planCache={};
  let planScale=1, planOffsetX=0, planOffsetY=0;
  let lastTouchDist=0, lastTouchX=0, lastTouchY=0;

  function loadPlan(id,cb){
    if(Object.prototype.hasOwnProperty.call(planCache,id)) return cb(planCache[id]);
    const d=planById(id); if(!d){ planCache[id]=null; return cb(null); }
    const im=new Image();
    im.onload=function(){ planCache[id]=im; cb(im); };
    im.onerror=function(){ planCache[id]=null; cb(null); };
    im.src=PLAN_DIR+d.file;
  }

  function drawPin(c,x,y,r,num){
    c.save();
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2);
    c.fillStyle='rgba(225,29,29,.88)'; c.fill();
    c.lineWidth=Math.max(1.5,r*0.22); c.strokeStyle='#fff'; c.stroke();
    c.beginPath();
    c.moveTo(x-r*1.9,y); c.lineTo(x-r*1.15,y);
    c.moveTo(x+r*1.15,y); c.lineTo(x+r*1.9,y);
    c.moveTo(x,y-r*1.9); c.lineTo(x,y-r*1.15);
    c.moveTo(x,y+r*1.15); c.lineTo(x,y+r*1.9);
    c.strokeStyle='rgba(225,29,29,.9)'; c.lineWidth=Math.max(1.2,r*0.2); c.stroke();
    if(num!=null){
      c.fillStyle='#fff';
      c.font='700 '+Math.round(r*1.25)+'px Archivo, sans-serif';
      c.textAlign='center'; c.textBaseline='middle';
      c.fillText(String(num),x,y+r*0.05);
    }
    c.restore();
  }

  // Same center-based transform used to draw the plan image, so pin
  // display and tap-to-coordinate math agree with it at any zoom/pan.
  function planImgToScreen(ix,iy){
    const w=pcv.width, h=pcv.height;
    return { x: w/2 + planScale*(ix - w/2 + planOffsetX),
             y: h/2 + planScale*(iy - h/2 + planOffsetY) };
  }
  function planScreenToImg(sx,sy){
    const w=pcv.width, h=pcv.height;
    return { x: (sx - w/2)/planScale + w/2 - planOffsetX,
             y: (sy - h/2)/planScale + h/2 - planOffsetY };
  }

  function paintPlanCanvas(){
    if(!plImg){ pcv.width=10; pcv.height=10; return; }
    const maxW=Math.min(window.innerWidth*1.5,840);
    const maxH=Math.round(window.innerHeight*0.6);
    const k=Math.min(maxW/plImg.width, maxH/plImg.height);
    pcv.width=Math.round(plImg.width*k);
    pcv.height=Math.round(plImg.height*k);
    pctx.clearRect(0,0,pcv.width,pcv.height);
    pctx.save();
    pctx.translate(pcv.width/2, pcv.height/2);
    pctx.scale(planScale, planScale);
    pctx.translate(-pcv.width/2 + planOffsetX, -pcv.height/2 + planOffsetY);
    pctx.drawImage(plImg,0,0,pcv.width,pcv.height);
    pctx.restore();
    if(plDraft && plDraft.id===plId){
      const pos = planImgToScreen(plDraft.x * pcv.width, plDraft.y * pcv.height);
      drawPin(pctx, pos.x, pos.y, Math.max(10,pcv.width/38 * planScale), null);
    }
  }

  // Pinch-zoom handlers
  function getTouchDist(e){
    const t=e.touches;
    if(t.length<2) return 0;
    const dx=t[0].clientX-t[1].clientX;
    const dy=t[0].clientY-t[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }

  function getTouchCenter(e){
    const t=e.touches;
    if(t.length<2) return {x:0,y:0};
    return {x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2};
  }

  pcv.addEventListener('touchstart', function(e){
    if(e.touches.length===2){
      lastTouchDist=getTouchDist(e);
      const center=getTouchCenter(e);
      const rect=pcv.getBoundingClientRect();
      lastTouchX=(center.x-rect.left)*(pcv.width/rect.width);
      lastTouchY=(center.y-rect.top)*(pcv.height/rect.height);
    }
  }, {passive:true});

  pcv.addEventListener('touchmove', function(e){
    if(e.touches.length===2){
      e.preventDefault();
      const dist=getTouchDist(e);
      const center=getTouchCenter(e);
      const rect=pcv.getBoundingClientRect();
      const cx=(center.x-rect.left)*(pcv.width/rect.width);
      const cy=(center.y-rect.top)*(pcv.height/rect.height);
      
      if(lastTouchDist>0){
        const scaleFactor=dist/lastTouchDist;
        const newScale=Math.min(3, Math.max(0.5, planScale*scaleFactor));
        planOffsetX += (cx - lastTouchX) * (1 - scaleFactor);
        planOffsetY += (cy - lastTouchY) * (1 - scaleFactor);
        planScale=newScale;
        paintPlanCanvas();
      }
      lastTouchDist=dist;
      lastTouchX=cx;
      lastTouchY=cy;
    }
  }, {passive:false});

  pcv.addEventListener('touchend', function(e){
    if(e.touches.length<2){
      lastTouchDist=0;
    }
  }, {passive:true});

  function buildPlanChips(){
    const box=$('plChips'); box.innerHTML='';
    PLANS.forEach(function(p){
      const b=document.createElement('button'); b.className='chip'; b.textContent=p.label;
      if(p.id===plId) b.classList.add('on');
      if(planCache[p.id]===null) b.classList.add('miss');
      b.onclick=function(){ selectPlan(p.id); };
      box.appendChild(b);
    });
  }

  function selectPlan(id){
    planScale=1; planOffsetX=0; planOffsetY=0;
    plId=id; buildPlanChips();
    $('plNote').textContent='Loading '+id+'...';
    loadPlan(id,function(im){
      plImg=im; buildPlanChips();
      if(!im){ $('plNote').textContent='No image found at '+PLAN_DIR+(planById(id)||{}).file+' - add it to the repo.'; pcv.width=10;pcv.height=10; return; }
      $('plNote').textContent='Pinch to zoom. Tap the plan to drop a pin.';
      paintPlanCanvas();
    });
  }

  pcv.addEventListener('pointerdown',function(e){
    if(!plImg) return;
    e.preventDefault();
    const p=pt(e,pcv);
    const img = planScreenToImg(p.x, p.y);
    plDraft={id:plId, x:Math.min(1,Math.max(0,img.x/pcv.width)), y:Math.min(1,Math.max(0,img.y/pcv.height))};
    paintPlanCanvas();
  });

  function updateLocBtn(){
    $('eLocTxt').textContent = editPlan ? (planLabel(editPlan)+' - pin set') : 'Not set';
  }
  $('eLoc').addEventListener('click',function(){
    planScale=1; planOffsetX=0; planOffsetY=0;
    plDraft = editPlan ? {id:editPlan.id,x:editPlan.x,y:editPlan.y} : null;
    plId = (editPlan&&editPlan.id) || (PLANS[0]&&PLANS[0].id) || null;
    $('plansheet').style.display='flex';
    buildPlanChips();
    if(plId) selectPlan(plId); else $('plNote').textContent='No plans configured in PLANS[].';
  });
  $('plCancel').addEventListener('click',function(){ $('plansheet').style.display='none'; });
  $('plClearPin').addEventListener('click',function(){ plDraft=null; paintPlanCanvas(); });
  $('plSave').addEventListener('click',function(){
    editPlan = plDraft ? {id:plDraft.id,x:plDraft.x,y:plDraft.y} : null;
    updateLocBtn();
    $('plansheet').style.display='none';
  });

  /* ---------------- list ---------------- */
  function ordered(){
    const canon=projZones().slice(), zones=canon.slice(), out=[];
    state.items.forEach(function(it){ const z=it.zone||'Unassigned'; if(zones.indexOf(z)<0) zones.push(z); });
    zones.forEach(function(z){ state.items.forEach(function(it){ if((it.zone||'Unassigned')===z) out.push(it); }); });
    return out;
  }
  function fmt(ts){ const d=new Date(ts); return d.toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
  function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]}); }
  function num(it){ return String(it.no==null?'?':it.no).padStart(2,'0'); }

  function render(){
    $('tallyNum').textContent=state.items.length;
    $('mastTitle').textContent=state.proj||'Site Visit Report';
    const e=$('entries');
    if(!state.items.length){ e.innerHTML='<div class="empty"><strong>No items yet</strong>Take a photo, mark it up, write the note. Do it standing in front of the issue.</div>'; return; }
    e.innerHTML='';
    const list=ordered(); let lastZone=null;
    list.forEach(function(it){
      const z=it.zone||'Unassigned';
      if(z!==lastZone){ const band=document.createElement('div'); band.className='zoneband'; band.textContent=z; e.appendChild(band); lastZone=z; }
      const d=document.createElement('div'); d.className='row';
      const n=document.createElement('div'); n.className='idx'; n.textContent=num(it);
      const im=document.createElement('img'); im.src=it.src; im.onclick=function(){ openEditor(it.src,it.ts,it); };
      const b=document.createElement('div'); b.className='body';
      const pinHtml=it.plan?'<div><span class="pin">'+esc(planLabel(it.plan))+'</span></div>':'';
      b.innerHTML='<div class="cmt">'+esc(it.cmt)+'</div>'+pinHtml+'<div class="time">'+fmt(it.ts)+'</div>';
      const k=document.createElement('button'); k.className='kill'; k.textContent='Remove';
      k.onclick=function(){
        if(!confirm('Remove item '+num(it)+'? The number stays retired.')) return;
        state.items=state.items.filter(function(x){return x.id!==it.id}); store.set(state); render();
      };
      b.appendChild(k);
      d.appendChild(n); d.appendChild(im); d.appendChild(b);
      e.appendChild(d);
    });
  }

  $('btnClear').addEventListener('click',function(){
    if(!state.items.length) return;
    if(confirm('Delete all '+state.items.length+' items? Export first if you need the PDF.')){
      state.items=[]; state.seq=0; state.refAuto=true; state.ref=autoRef(state.date);
      $('fRef').value=state.ref; store.set(state); render();
    }
  });

  /* ---------------- Share ---------------- */
  $('btnShare').addEventListener('click',function(){
    if(!state.items.length){ flash('Nothing to share yet'); return; }
    flash('Building PDF for sharing...');
    const ids=[];
    state.items.forEach(function(it){ if(it.plan && ids.indexOf(it.plan.id)<0) ids.push(it.plan.id); });
    let left=ids.length;
    if(!left) return setTimeout(sharePdf,60);
    ids.forEach(function(id){ loadPlan(id,function(){ if(--left===0) setTimeout(sharePdf,60); }); });
  });

  function renderReport(){
    const jsPDF=window.jspdf.jsPDF;
    const doc=new jsPDF({unit:'pt',format:'letter'});
    const W=612, H=792, M=54;
    const proj=state.proj||'Site Visit Report';
    const list=ordered();
    const INK=[20,32,43], MARK=[123,167,175], MID=[109,118,128], HAIR=[214,213,208];
    const FOOT=64;

    function brandbar(full){
      doc.setFillColor(INK[0],INK[1],INK[2]);
      doc.rect(0,0,W, full?96:54,'F');
      if(logoPng){ try{ doc.addImage(logoPng,'PNG',M, full?30:18, 19, 17.5); }catch(e){} }
      doc.setFont('helvetica','bold'); doc.setFontSize(9.5);
      doc.setTextColor(MARK[0],MARK[1],MARK[2]);
      doc.text('CONSTELLATION', M+28, full?43.5:31.5, {charSpace:3.2});
      if(full){
        doc.setFont('helvetica','bold'); doc.setFontSize(17); doc.setTextColor(245,244,241);
        doc.text('Site Visit Report', M, 78);
        doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(MARK[0],MARK[1],MARK[2]);
        doc.text('FIELD OBSERVATION RECORD', W-M, 78, {align:'right', charSpace:1.6});
      }else{
        doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,165,172);
        const t=proj+(state.ref?'   /   '+state.ref:'');
        doc.text(t, W-M, 31.5, {align:'right'});
      }
    }

    function metaBlock(y){
      const cols=[
        ['PROJECT', proj],
        ['VISIT DATE', state.date||''],
        ['OBSERVED BY', state.by||''],
        ['REPORT NO.', state.ref||'-']
      ];
      const cw=(W-2*M)/4;
      cols.forEach(function(c,i){
        doc.setFont('helvetica','bold'); doc.setFontSize(6.8); doc.setTextColor(MID[0],MID[1],MID[2]);
        doc.text(c[0], M+i*cw, y, {charSpace:1.1});
        doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(doc.splitTextToSize(c[1]||'-', cw-10).slice(0,1), M+i*cw, y+13);
      });
      y+=26;
      if(state.to){
        doc.setFont('helvetica','bold'); doc.setFontSize(6.8); doc.setTextColor(MID[0],MID[1],MID[2]);
        doc.text('ISSUED TO', M, y, {charSpace:1.1});
        doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(INK[0],INK[1],INK[2]);
        doc.text(doc.splitTextToSize(state.to, W-2*M).slice(0,1), M, y+13);
        y+=26;
      }
      doc.setDrawColor(HAIR[0],HAIR[1],HAIR[2]); doc.line(M,y,W-M,y);
      return y+18;
    }

    let y;
    brandbar(true);
    y=metaBlock(122);

    function tableHead(yy){
      doc.setFillColor(236,235,231); doc.rect(M,yy,W-2*M,18,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(6.8); doc.setTextColor(MID[0],MID[1],MID[2]);
      doc.text('#',M+8,yy+12,{charSpace:1.1});
      doc.text('PHOTO',M+30,yy+12,{charSpace:1.1});
      doc.text('OBSERVATION',M+124,yy+12,{charSpace:1.1});
      return yy+18;
    }
    y=tableHead(y);

    const TH=62, TW=78, CX=M+124, LH=11.5;
    let lastZone=null;
    list.forEach(function(it){
      const z=it.zone||'Unassigned';
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
      const lines=doc.splitTextToSize(it.cmt||'', W-M-CX);
      const textHeight = Math.max(TH, lines.length * LH + 4);
      const rowH = textHeight + 20;
      let need=(z!==lastZone);
      if(y+rowH+(need?21:0) > H-FOOT){
        doc.addPage(); brandbar(false); y=78; lastZone=null; need=true;
      }
      if(need){
        doc.setFillColor(INK[0],INK[1],INK[2]); doc.rect(M,y,W-2*M,16,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(MARK[0],MARK[1],MARK[2]);
        doc.text(z.toUpperCase(),M+8,y+11,{charSpace:1.8});
        y+=21; lastZone=z;
      }
      doc.setDrawColor(HAIR[0],HAIR[1],HAIR[2]); doc.line(M,y,W-M,y);
      const ty=y+11;
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(String(it.no==null?'-':it.no),M+8,ty+8);
      const imgSrc = it.thumb || it.src;
      try{ doc.addImage(imgSrc, 'JPEG', M+30, ty, TW, TH); }catch(e){ console.log('Image failed for item', it.no, e.message); }
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(35,45,55);
      doc.text(lines,CX,ty+9,{lineHeightFactor:1.21});
      doc.setFontSize(7); doc.setTextColor(160,168,175);
      const meta=fmt(it.ts)+(it.plan?'    PLAN '+planLabel(it.plan):'');
      doc.text(meta,CX,ty+textHeight+1);
      y+=rowH;
    });

    const TOP=78, SLOT=(H-TOP-FOOT)/2;
    list.forEach(function(it,i){
      const slot=i%2;
      if(slot===0){ doc.addPage(); brandbar(false); }
      const top=TOP+slot*SLOT;
      if(slot===1){ doc.setDrawColor(HAIR[0],HAIR[1],HAIR[2]); doc.line(M,top-12,W-M,top-12); }

      doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(93,137,145);
      doc.text('ITEM '+(it.no==null?'-':it.no),M,top+2,{charSpace:1.4});
      doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(INK[0],INK[1],INK[2]);
      doc.text(it.zone||'Unassigned',M+52,top+3);
      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(160,168,175);
      doc.text(fmt(it.ts)+(it.plan?'   /   PLAN '+planLabel(it.plan):''),W-M,top+2,{align:'right'});

      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(35,45,55);
      let lines=doc.splitTextToSize(it.cmt||'', W-2*M);
      const MAXL=5; let clipped=false;
      if(lines.length>MAXL){ lines=lines.slice(0,MAXL); clipped=true; }
      doc.text(lines,M,top+18,{lineHeightFactor:1.21});
      if(clipped){
        doc.setFontSize(6.5); doc.setTextColor(160,168,175);
        doc.text('(observation continues in the summary table)',M,top+18+lines.length*11.5+2);
      }

      const imgTop=top+18+lines.length*11.5+(clipped?12:6);
      const availH=(top+SLOT-16)-imgTop;
      const kp=keyplanUrl(it);
      const KPW=kp?132:0, GAP=kp?14:0;
      const availW=W-2*M-KPW-GAP;

      let props; try{ props=doc.getImageProperties(it.src); }catch(e){ props={width:4,height:3}; }
      const k=Math.min(availW/props.width, availH/props.height);
      const w=props.width*k, h=props.height*k;
      try{ doc.addImage(it.src,'JPEG',M+(availW-w)/2,imgTop,w,h); }catch(e){}

      if(kp){
        const kk=Math.min(KPW/kp.w, availH/kp.h);
        const kw=kp.w*kk, kh=kp.h*kk, kx=W-M-KPW+(KPW-kw)/2;
        doc.setFillColor(255,255,255); doc.rect(kx-3,imgTop-3,kw+6,kh+6,'F');
        doc.setDrawColor(HAIR[0],HAIR[1],HAIR[2]); doc.rect(kx-3,imgTop-3,kw+6,kh+6);
        try{ doc.addImage(kp.url,'JPEG',kx,imgTop,kw,kh); }catch(e){}
        doc.setFont('helvetica','bold'); doc.setFontSize(6.2); doc.setTextColor(MID[0],MID[1],MID[2]);
        doc.text('KEY PLAN - '+planLabel(it.plan).toUpperCase(), kx, imgTop+kh+11, {charSpace:1});
      }
    });

    const tot=doc.getNumberOfPages();
    for(let p=1;p<=tot;p++){
      doc.setPage(p);
      doc.setDrawColor(HAIR[0],HAIR[1],HAIR[2]); doc.line(M,H-50,W-M,H-50);
      doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(150,158,166);
      doc.text('Observations recorded during a general site visit. Not an exhaustive inspection and not a directive to change contract scope, schedule, or cost.',M,H-38);
      doc.text('Neither the inclusion nor the omission of an item constitutes approval, acceptance, or rejection of the Work.',M,H-29);
      doc.text('Page '+p+' of '+tot,W-M,H-29,{align:'right'});
    }

    return doc;
  }

  function buildPdf(){
    const doc=renderReport();
    doc.save(getFilename());
    flash('PDF exported');
  }

  function sharePdf(){
    const doc=renderReport();
    const pdfBlob = doc.output('blob');
    const filename = getFilename();

    if(navigator.share){
      navigator.share({
        title: filename,
        files: [new File([pdfBlob], filename, {type: 'application/pdf'})]
      }).then(function(){
        flash('PDF shared');
      }).catch(function(err){
        if(err.name !== 'AbortError'){
          flash('Share cancelled or failed');
        }
      });
    } else {
      // Fallback: download
      const a = document.createElement('a');
      a.href = URL.createObjectURL(pdfBlob);
      a.download = filename;
      a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 10000);
      flash('PDF downloaded (share not supported)');
    }
  }

  function keyplanUrl(it){
    if(!it.plan) return null;
    const im=planCache[it.plan.id];
    if(!im) return null;
    try{
      const MAXP=900, k=Math.min(1, MAXP/Math.max(im.width,im.height));
      const c=document.createElement('canvas');
      c.width=Math.round(im.width*k); c.height=Math.round(im.height*k);
      const x=c.getContext('2d');
      x.fillStyle='#fff'; x.fillRect(0,0,c.width,c.height);
      x.drawImage(im,0,0,c.width,c.height);
      drawPin(x, it.plan.x*c.width, it.plan.y*c.height, Math.max(11,c.width/26), it.no);
      return {url:c.toDataURL('image/jpeg',0.8), w:c.width, h:c.height};
    }catch(e){ return null; }
  }

  function getFilename(){
    const proj = (state.proj || 'SiteVisit').replace(/[^a-z0-9]/gi,'_');
    const ref = (state.ref || 'SVR').replace(/[^a-z0-9]/gi,'_');
    const date = state.date || todayLocal();
    return proj + '_' + ref + '_' + date + '.pdf';
  }

  /* ---------------- PDF export ---------------- */
  $('btnPdf').addEventListener('click',function(){
    if(!window.jspdf){ flash('PDF library missing - check jspdf.umd.min.js is in the repo'); return; }
    if(!state.items.length){ flash('Nothing to export yet'); return; }
    flash('Building PDF...');
    const ids=[];
    state.items.forEach(function(it){ if(it.plan && ids.indexOf(it.plan.id)<0) ids.push(it.plan.id); });
    let left=ids.length;
    if(!left) return setTimeout(buildPdf,60);
    ids.forEach(function(id){ loadPlan(id,function(){ if(--left===0) setTimeout(buildPdf,60); }); });
  });

})();
</script>
